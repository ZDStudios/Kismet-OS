services:
  kismet-test-desktop:
    build:
      context: .
      dockerfile: Dockerfile.preview-test
    container_name: kismet-test-desktop
    ports:
      - "6080:80"
      - "5901:5900"
    environment:
      - VNC_PW=kismet
    volumes:
      - ../:/workspace
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
