[desktop]
flavor = gnome
style = kismet-zorin
base = ubuntu
inspiration = zorin,gnome
panel = bottom-dock
accent = blue
surface = glass-dark
window_radius = medium
icon_theme = yaru-blue
login_manager = gdm

[ai]
ollama_enabled = true
openclaw_enabled = true
hermes_enabled = true
opencode_enabled = true
local_first = true
model_strategy = auto-recommend
preferred_provider = hermes

[system]
default_shell = zsh
auto_configure_docker = true
enable_flatpak = true
windows_compat = wine-lutris
